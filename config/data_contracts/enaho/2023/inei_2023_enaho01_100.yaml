# ==============================================================================
# DATA CONTRACT: INEI - ENAHO
# Capa: Bronze -> Silver
# Motor de Validación Esperado: DuckDB (vía Dagster)
# ==============================================================================
dataset:
  domain: housing
  silver_name: enaho_housing_hhold_chars
  grain: hhold
  description: Características físicas de la vivienda (Materiales, agua, luz).
  source_system: inei_microdatos
  bronze_name: inei_2023_enaho01_100_raw
  raw_file_name: Enaho01-2023-100.csv
  year: 2023
schema:
  physical_type: parquet
  engine: duckdb
  columns:

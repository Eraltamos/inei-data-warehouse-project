# ==============================================================================
# DATA CONTRACT: INEI - ENAHO
# Capa: Bronze -> Silver
# Motor de Validación Esperado: DuckDB (vía Dagster)
# ==============================================================================
dataset:
  domain: non_food_expenses
  silver_name: enaho_non_food_expenses_item_housing_srv
  grain: item
  description: Servicios a la vivienda (cochera, vigilancia).
  source_system: inei_microdatos
  bronze_name: inei_2023_enaho01_605_raw
  raw_file_name: Enaho01-2023-605.csv
  year: 2023
schema:
  physical_type: parquet
  engine: duckdb
  columns:
  - name: AÑO
    type: VARCHAR
    description: Año de la Encuesta
    aliases:
    - ANO
    - ANIO
  - name: MES
    type: VARCHAR
    description: Mes de Ejecución de la Encuesta
  - name: NCONGLOME
    type: VARCHAR
    description: Número de Conglomerado (proveniente del marco)
  - name: SUB_CONGLOME
    type: VARCHAR
    description: Número de Subconglomerado (proveniente del marco)
  - name: CONGLOME
    type: VARCHAR
    description: Número de Conglomerado
  - name: VIVIENDA
    type: VARCHAR
    description: Número de Selección de Vivienda
  - name: HOGAR
    type: VARCHAR
    description: Número secuencial del Hogar
  - name: UBIGEO
    type: VARCHAR
    description: Ubicación geográfica
  - name: DOMINIO
    type: INTEGER
    description: Dominio Geográfico
    semantic_dictionary:
      '1': Costa Norte
      '2': Costa Centro
      '3': Costa Sur
      '4': Sierra Norte
      '5': Sierra Centro
      '6': Sierra Sur
      '7': Selva
      '8': Lima Metropolitana  – 8
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
  - name: ESTRATO
    type: INTEGER
    description: Estrato Geográfico
    semantic_dictionary:
      '1': De 500 000 a más habitantes
      '2': De 100 000 a 499 999 habitantes
      '3': De 50 000 a 99 999 habitantes
      '4': De 20 000 a 49 999 habitantes
      '5': De 2 000 a 19 999 habitantes
      '6': De 500 a 1 999 habitantes
      '7': Área de Empadronamiento Rural (AER) Compuesto
      '8': Área de Empadronamiento Rural (AER) Simple  – 8
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
  - name: P605N
    type: INTEGER
    description: Servicios a la vivienda
    semantic_dictionary:
      '1': Cochera
      '2': Guardianía
      '3': Servicio doméstico
      '4': Servicio comunitario
      '5': Vigilancia vecinal (serenazgo)
      '6': Mantenimiento de edificio
      '7': Recojo privado de basura (triciclo, carretilla, camión, etc)
      '8': Otro  – 8
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
  - name: P605
    type: INTEGER
    description: 'En el mes anterior ..., Ud. y/o algún miembro de este hogar hicieron
      uso de:'
    semantic_dictionary:
      '1': Si
      '2': 'No'
    sentinel_nulls:
    - 9
    constraints:
    - allowed_values:
      - 1
      - 2
  - name: P605A1
    type: INTEGER
    description: ¿El gasto realizado por este servicio de ... fue:? Pagado por algún
      miembro de este hogar
    semantic_dictionary:
      '0': Pase
      '1': Pagado por algún miembro de este hogar
    constraints:
    - allowed_values:
      - 0
      - 1
  - name: P605A2
    type: INTEGER
    description: ¿El gasto realizado por este servicio de ... fue:? Regalado o pagado
      por algún miembro de otro hogar
    semantic_dictionary:
      '0': Pase
      '1': Regalado o pagado por algún miembro de otro hogar
    constraints:
    - allowed_values:
      - 0
      - 1
  - name: P605A3
    type: INTEGER
    description: ¿El gasto realizado por este servicio de ... fue:? No gastó
    semantic_dictionary:
      '0': Pase
    constraints:
    - allowed_values:
      - 0
  - name: P605A4
    type: INTEGER
    description: ¿El gasto realizado por este servicio de ... fue:? Incluido en el
      alquiler
    semantic_dictionary:
      '0': Pase
      '1': Incluido en el alquiler
    constraints:
    - allowed_values:
      - 0
      - 1
  - name: P605A5
    type: INTEGER
    description: ¿El gasto realizado por este servicio de ... fue:? Otro servicio
    semantic_dictionary:
      '0': Pase
      '1': Otro
    constraints:
    - allowed_values:
      - 0
      - 1
  - name: P605A6
    type: INTEGER
    description: ¿El gasto realizado por este servicio de ... fue:? No sabe/no responde
    semantic_dictionary:
      '0': Pase
      '1': No sabe/ no responde
    constraints:
    - allowed_values:
      - 0
      - 1
  - name: P605B
    type: DOUBLE
    description: ¿Cuál fue el monto mensual por el servicio? 999999.
    sentinel_nulls:
    - '9'
  - name: P605C2
    type: DOUBLE
    description: ¿Cuánto cree que le costaria, si tuviera que pagar por este producto
      o servicio? - Regalado o pagado por algún miembro de otro hogar 999999.
    sentinel_nulls:
    - '9'
  - name: P605C3
    type: DOUBLE
    description: ¿Cuánto cree que le costaria, si tuviera que pagar por este producto
      o servicio? -No gastó 999999.
    sentinel_nulls:
    - '9'
  - name: P605C4
    type: DOUBLE
    description: ¿Cuánto cree que le costaria, si tuviera que pagar por este producto
      o servicio? - Incluído en el alquiler 999999.
    sentinel_nulls:
    - '9'
  - name: P605C5
    type: DOUBLE
    description: ¿Cuánto cree que le costaria, si tuviera que pagar por este producto
      o servicio? -Otro 999999.
    sentinel_nulls:
    - '9'
  - name: P605C
    type: DOUBLE
    description: ¿Cuánto cree que le costaría si tuviera que pagar por este servicio?
      999999.
    sentinel_nulls:
    - '9'
  - name: D605B
    type: DOUBLE
    description: (Deflactado, anualizado) ¿Cuál fue el monto mensual por el servicio?
      999999.
    sentinel_nulls:
    - '9'
  - name: D605C2
    type: DOUBLE
    description: (Deflactado, anualizado) ¿Cuánto cree que le costaria, si tuviera
      que pagar por este producto o servicio? –Regalado o pagado por algún miembro
      de otro hogar 999999.
    sentinel_nulls:
    - '9'
  - name: D605C3
    type: DOUBLE
    description: (Deflactado, anualizado) ¿Cuánto cree que le costaria, si tuviera
      que pagar por este producto o servicio? –No gastó 999999.
    sentinel_nulls:
    - '9'
  - name: D605C4
    type: DOUBLE
    description: (Deflactado, anualizado)¿Cuánto cree que le costaria, si tuviera
      que pagar por este producto o servicio? –Incluído en el alquiler 999999.
    sentinel_nulls:
    - '9'
  - name: D605C5
    type: DOUBLE
    description: (Deflactado, anualizado) ¿Cuánto cree que le costaria, si tuviera
      que pagar por este producto o servicio? -Otro 999999.
    sentinel_nulls:
    - '9'
  - name: D605C
    type: DOUBLE
    description: (Deflactado, anualizado) ¿Cuánto cree que le costaría si tuviera
      que pagar por este servicio? 999999.
    sentinel_nulls:
    - '9'
  - name: I605B
    type: DOUBLE
    description: (Imputado, deflactado, anualizado) ¿Cuál fue el monto mensual por
      el servicio?
  - name: I605C2
    type: DOUBLE
    description: (Imputado, deflactado , anualizado) ¿Cuánto cree que le costaria,
      si tuviera que pagar por este producto o servicio? -Regalado por algún miembro
      de otro hogar
  - name: I605C3
    type: DOUBLE
    description: (Imputado, deflactado , anualizado) ¿Cuánto cree que le costaria,
      si tuviera que pagar por este producto o servicio? –No gastó
  - name: I605C4
    type: DOUBLE
    description: (Imputado, deflactado , anualizado) ¿Cuánto cree que le costaria,
      si tuviera que pagar por este producto o servicio? –Incluído en el alquiler
  - name: I605C5
    type: DOUBLE
    description: (Imputado, deflactado , anualizado) ¿Cuánto cree que le costaria,
      si tuviera que pagar por este producto o servicio? -Otro
  - name: I605C
    type: DOUBLE
    description: (Imputado, deflactado, anualizado) ¿Cuánto cree que le costaría si
      tuviera que pagar por este servicio?
  - name: TICUEST01
    type: INTEGER
    description: Origen de cuestionario
    semantic_dictionary:
      '1': Cuestionario en hojas
      '2': Cuestionario en Tablet
    constraints:
    - allowed_values:
      - 1
      - 2
  - name: FACTOR07
    type: DOUBLE
    description: Factor de expansión anual proyecciones CPV-2007

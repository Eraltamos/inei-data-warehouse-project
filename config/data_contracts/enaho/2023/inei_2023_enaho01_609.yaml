# ==============================================================================
# DATA CONTRACT: INEI - ENAHO
# Capa: Bronze -> Silver
# Motor de Validación Esperado: DuckDB (vía Dagster)
# ==============================================================================
dataset:
  domain: financial_flows
  silver_name: enaho_financial_flows_item_transfers
  grain: item
  description: Remesas enviadas, limosnas, impuestos, pensiones.
  source_system: inei_microdatos
  bronze_name: inei_2023_enaho01_609_raw
  raw_file_name: Enaho01-2023-609.csv
  year: 2023
schema:
  physical_type: parquet
  engine: duckdb
  columns:
  - name: AÑO
    type: VARCHAR
    description: Año de la Encuesta
    aliases:
    - ANO
    - ANIO
  - name: MES
    type: VARCHAR
    description: Mes de Ejecución de la Encuesta
  - name: NCONGLOME
    type: VARCHAR
    description: Número de Conglomerado (proveniente del marco)
  - name: SUB_CONGLOME
    type: VARCHAR
    description: Número de Subconglomerado (proveniente del marco)
  - name: CONGLOME
    type: VARCHAR
    description: Número de Conglomerado
  - name: VIVIENDA
    type: VARCHAR
    description: Número de Selección de Vivienda
  - name: HOGAR
    type: VARCHAR
    description: Número secuencial del Hogar
  - name: UBIGEO
    type: VARCHAR
    description: Ubicación geográfica
  - name: DOMINIO
    type: INTEGER
    description: Dominio Geográfico
    semantic_dictionary:
      '1': Costa Norte
      '2': Costa Centro
      '3': Costa Sur
      '4': Sierra Norte
      '5': Sierra Centro
      '6': Sierra Sur
      '7': Selva
      '8': Lima Metropolitana  – 8
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
  - name: ESTRATO
    type: INTEGER
    description: Estrato Geográfico
    semantic_dictionary:
      '1': De 500 000 a más habitantes
      '2': De 100 000 a 499 999 habitantes
      '3': De 50 000 a 99 999 habitantes
      '4': De 20 000 a 49 999 habitantes
      '5': De 2 000 a 19 999 habitantes
      '6': De 500 a 1 999 habitantes
      '7': Área de Empadronamiento Rural (AER) Compuesto
      '8': Área de Empadronamiento Rural (AER) Simple  – 8
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
  - name: P609N
    type: INTEGER
    description: Gastos de transferencia
    semantic_dictionary:
      '1': Pensión por alimentos, etc.
      '2': Propinas a menores de 14 años miembros del hogar
      '3': Propinas a personas fuera del hogar
      '4': 'Donaciones a instituciones: Iglesia (limosna), Cáritas, etc.'
      '5': Remesas, donaciones o regalos a miembros del hogar que están fuera de él
      '6': Impuestos directos (Rentas, autovalúo,etc)
      '7': Pago de seguro de vida y otros seguros (Seguro facultativo, SOAT, etc.)
      '8': Remesas periódicas a otros familiares que no residan en la vivienda
      '9': Otros gastos  – 9
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
      - 9
  - name: P609
    type: INTEGER
    description: 'En los últimos 3 meses Ud. y/o algún miembro de este hogar gastaron
      en:'
    semantic_dictionary:
      '1': Si
      '2': No    – 2
    sentinel_nulls:
    - 9
    constraints:
    - allowed_values:
      - 1
      - 2
  - name: P609A
    type: DOUBLE
    description: ¿Cuánto gastó? 999999.
    sentinel_nulls:
    - '9'
  - name: D609A
    type: DOUBLE
    description: (Deflactado, anualizado) ¿Cuánto gastó? 999999.
    sentinel_nulls:
    - '9'
  - name: I609A
    type: DOUBLE
    description: (Imputado, deflactado, anualizado) ¿Cuánto gastó?
  - name: TICUEST01
    type: INTEGER
    description: Origen de cuestionario
    semantic_dictionary:
      '1': Cuestionario en hojas
      '2': Cuestionario en Tablet
    constraints:
    - allowed_values:
      - 1
      - 2
  - name: FACTOR07
    type: DOUBLE
    description: Factor de expansión anual proyecciones CPV-2007

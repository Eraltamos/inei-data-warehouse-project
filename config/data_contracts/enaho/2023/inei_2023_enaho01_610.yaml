# ==============================================================================
# DATA CONTRACT: INEI - ENAHO
# Capa: Bronze -> Silver
# Motor de Validación Esperado: DuckDB (vía Dagster)
# ==============================================================================
dataset:
  domain: non_food_expenses
  silver_name: enaho_non_food_expenses_item_furniture
  grain: item
  description: Compra y reparación de muebles y enseres.
  source_system: inei_microdatos
  bronze_name: inei_2023_enaho01_610_raw
  raw_file_name: Enaho01-2023-610.csv
  year: 2023
schema:
  physical_type: parquet
  engine: duckdb
  columns:
  - name: AÑO
    type: VARCHAR
    description: Año de la Encuesta
    aliases:
    - ANO
    - ANIO
  - name: MES
    type: VARCHAR
    description: Mes de Ejecución de la Encuesta
  - name: NCONGLOME
    type: VARCHAR
    description: Número de Conglomerado (proveniente del marco)
  - name: SUB_CONGLOME
    type: VARCHAR
    description: Número de Subconglomerado (proveniente del marco)
  - name: CONGLOME
    type: VARCHAR
    description: Número de Conglomerado
  - name: VIVIENDA
    type: VARCHAR
    description: Número de Selección de Vivienda
  - name: HOGAR
    type: VARCHAR
    description: Número secuencial del Hogar
  - name: UBIGEO
    type: VARCHAR
    description: Ubicación geográfica
  - name: DOMINIO
    type: INTEGER
    description: Dominio Geográfico
    semantic_dictionary:
      '1': Costa Norte
      '2': Costa Centro
      '3': Costa Sur
      '4': Sierra Norte
      '5': Sierra Centro
      '6': Sierra Sur
      '7': Selva
      '8': Lima Metropolitana  – 8
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
  - name: ESTRATO
    type: INTEGER
    description: Estrato Geográfico
    semantic_dictionary:
      '1': De 500 000 a más habitantes
      '2': De 100 000 a 499 999 habitantes
      '3': De 50 000 a 99 999 habitantes
      '4': De 20 000 a 49 999 habitantes
      '5': De 2 000 a 19 999 habitantes
      '6': De 500 a 1 999 habitantes
      '7': Área de Empadronamiento Rural (AER) Compuesto
      '8': Área de Empadronamiento Rural (AER) Simple  – 8
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
  - name: P610N
    type: INTEGER
    description: Gasto en muebles y enseres
    semantic_dictionary:
      '1': Repararon muebles del hogar(cama, mesa, etc.)
      '2': Repararon aparatos electrodomésticos(radio, tv, etc.)
      '3': Tejidos, artículos de tela para el hogar(cortinas, sábanas, toallas, etc)
      '4': Cristalería, vajilla y utensilios domésticos
      '5': Compraron muebles del hogar(muebles de sala, dormitorio, cocina, armarios,
        etc.
      '6': Otros gastos  – 6
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
  - name: P610
    type: INTEGER
    description: 'En los últimos 12 meses Ud. y/o algún miembro de este hogar obtuvieron,
      consiguieron, compraron o le regalaron:'
    semantic_dictionary:
      '1': Si
      '2': No    – 2, 9
    sentinel_nulls:
    - 9
    constraints:
    - allowed_values:
      - 1
      - 2
  - name: P610A1
    type: INTEGER
    description: '¿Cómo obtuvieron el(la) ... ?: Comprado'
    semantic_dictionary:
      '0': Pase
      '1': Comprado  ,1
    constraints:
    - allowed_values:
      - 0
      - 1
  - name: P610A2
    type: INTEGER
    description: '¿Cómo obtuvieron el(la) ... ?: Autoconsumo'
    semantic_dictionary:
      '0': Pase
      '1': Autoconsumo  ,1
    constraints:
    - allowed_values:
      - 0
      - 1
  - name: P610A3
    type: INTEGER
    description: '¿Cómo obtuvieron el(la) ... ?: Autosuministro'
    semantic_dictionary:
      '0': Pase  ,1
    constraints:
    - allowed_values:
      - 0
  - name: P610A4
    type: INTEGER
    description: '¿Cómo obtuvieron el(la) ... ?: Como parte de pago a un miembro del
      hogar'
    semantic_dictionary:
      '0': Pase
      '1': Como parte de pago a un miembro del hogar  ,1
    constraints:
    - allowed_values:
      - 0
      - 1
  - name: P610A5
    type: INTEGER
    description: '¿Cómo obtuvieron el(la) ... ?: Regalado o pagado por miembro de
      otro hogar'
    semantic_dictionary:
      '0': Pase
      '1': Regalado o pagado por algún miembro de otro hogar  ,1
    constraints:
    - allowed_values:
      - 0
      - 1
  - name: P610A6
    type: INTEGER
    description: '¿Cómo obtuvieron el(la) ... ?: Donado por alguna institución o programa
      social'
    semantic_dictionary:
      '0': Pase
      '1': Donado por alguna institución o programa social  ,1
    constraints:
    - allowed_values:
      - 0
      - 1
  - name: P610A7
    type: INTEGER
    description: '¿Cómo obtuvieron el(la) ... ?: Otro'
    semantic_dictionary:
      '0': Pase
      '1': Otro  ,1
    constraints:
    - allowed_values:
      - 0
      - 1
  - name: P610A8
    type: INTEGER
    description: '¿Cómo obtuvieron el(la) ... ?: No sabe/no responde'
    semantic_dictionary:
      '0': Pase
      '1': No sabe/no responde  ,1
    constraints:
    - allowed_values:
      - 0
      - 1
  - name: P610AA
    type: INTEGER
    description: ¿Dónde lo compró?
    semantic_dictionary:
      '1': Ambulante
      '2': Tienda especializada al por mayor
      '3': Tienda especializada al por menor
      '4': Mercado (por menor)
      '5': Mercado (por mayor)
      '6': Supermercado
      '7': Camioneta, camión
      '8': Feria
      '9': Otro  ,9
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
      - 9
  - name: P610B
    type: DOUBLE
    description: ¿Cuánto fue el monto total por la compra o servicio? 999999.
    sentinel_nulls:
    - '9'
  - name: P610C2
    type: DOUBLE
    description: ¿Cuánto cree que le costaria si tuviera que pagar por este producto
      o servicio? - Autoconsumo 999999.
    sentinel_nulls:
    - '9'
  - name: P610C3

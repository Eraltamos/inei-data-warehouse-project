# ==============================================================================
# DATA CONTRACT: INEI - ENAHO
# Capa: Bronze -> Silver
# Motor de Validación Esperado: DuckDB (vía Dagster)
# ==============================================================================
dataset:
  domain: social_progs
  silver_name: enaho_social_progs_item_foodbank_meals
  grain: item
  description: Raciones recibidas (Desayuno, almuerzo, cena).
  source_system: inei_microdatos
  bronze_name: inei_2023_enaho01_613h_raw
  raw_file_name: Enaho01-2023-613H.csv
  year: 2023
schema:
  physical_type: parquet
  engine: duckdb
  columns:
  - name: AÑO
    type: VARCHAR
    description: Año de la Encuesta
    aliases:
    - ANO
    - ANIO
  - name: MES
    type: VARCHAR
    description: Mes de Ejecución de la Encuesta
  - name: NCONGLOME
    type: VARCHAR
    description: Número de Conglomerado (proveniente del marco)
  - name: SUB_CONGLOME
    type: VARCHAR
    description: Número de Subconglomerado (proveniente del marco)
  - name: CONGLOME
    type: VARCHAR
    description: Número de Conglomerado
  - name: VIVIENDA
    type: VARCHAR
    description: Número de Selección de Vivienda
  - name: HOGAR
    type: VARCHAR
    description: Número secuencial del Hogar
  - name: UBIGEO
    type: VARCHAR
    description: Ubicación geográfica
  - name: DOMINIO
    type: INTEGER
    description: Dominio Geográfico
    semantic_dictionary:
      '1': Costa Norte
      '2': Costa Centro
      '3': Costa Sur
      '4': Sierra Norte
      '5': Sierra Centro
      '6': Sierra Sur
      '7': Selva
      '8': Lima Metropolitana  – 8
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
  - name: ESTRATO
    type: INTEGER
    description: Estrato Geográfico
    semantic_dictionary:
      '1': De 500 000 a más habitantes
      '2': De 100 000 a 499 999 habitantes
      '3': De 50 000 a 99 999 habitantes
      '4': De 20 000 a 49 999 habitantes
      '5': De 2 000 a 19 999 habitantes
      '6': De 500 a 1 999 habitantes
      '7': Área de Empadronamiento Rural (AER) Compuesto
      '8': Área de Empadronamiento Rural (AER) Simple  – 8
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
  - name: P613H
    type: INTEGER
    description: 'Los alimentos preparados obtenidos de la olla comun, correspondian
      a:'
    semantic_dictionary:
      '1': Si
      '2': No  –2
    sentinel_nulls:
    - 9
    constraints:
    - allowed_values:
      - 1
      - 2
  - name: P613H1
    type: INTEGER
    description: '¿Con que frecuencia recibio los alimentos de la Olla Común en:'
    semantic_dictionary:
      '1': De lunes a viernes
      '2': De lunes a sábado
      '3': 1 vez x semana
      '4': 2 veces x semana
      '5': 3 veces x semana
      '6': Otra frecuencia  –6
    sentinel_nulls:
    - 9
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
  - name: P613H2
    type: INTEGER
    description: Generalmente, ¿Cuantas raciones de ... recibio cada vez?
    sentinel_nulls:
    - 99
  - name: P613H3
    type: INTEGER
    description: '¿Pago:'
    semantic_dictionary:
      '1': Por el alimento
      '2': Por otros pagos asociados (transporte del alimento, kerosene, cocinera,
        etc.)
      '3': No realizó ningún pago  –6
    sentinel_nulls:
    - 9
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
  - name: P613H4
    type: DOUBLE
    description: Generalmente, ¿Cuanto pago cada vez por el alimento recibido? 999999,
  - name: P613H5
    type: INTEGER
    description: No realizó ningún pago porque
    semantic_dictionary:
      '1': Apoya en la preparación de alimentos
      '2': Apoya en otras labores
      '3': Es caso social
      '4': No realizó ningún pago  –4
    sentinel_nulls:
    - '9'
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
  - name: D613H4
    type: DOUBLE
    description: (Deflactado, anualizado) - Generalmente, ¿Cuanto pago cada vez por
      el alimento recibido? 999999,
    sentinel_nulls:
    - '9'
  - name: I613H4
    type: DOUBLE
    description: (Imputado, deflactado, anualizado) - Generalmente, ¿Cuanto pago cada
      vez por el alimento recibido?
  - name: TICUEST01
    type: INTEGER
    description: Origen de cuestionario
    semantic_dictionary:
      '1': Cuestionario en hojas
      '2': Cuestionario en Tablet
    constraints:
    - allowed_values:
      - 1
      - 2
  - name: FACTOR07
    type: DOUBLE
    description: Factor de expansión anual proyecciones CPV-2007
  - name: P613HN
    type: VARCHAR
    description: Columna detectada en el CSV de origen sin documentación oficial en
      el diccionario.
    required: false
    metadata_missing: true

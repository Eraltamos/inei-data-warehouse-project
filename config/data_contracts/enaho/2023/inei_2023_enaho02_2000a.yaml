# ==============================================================================
# DATA CONTRACT: INEI - ENAHO
# Capa: Bronze -> Silver
# Motor de Validación Esperado: DuckDB (vía Dagster)
# ==============================================================================
dataset:
  domain: agriculture
  silver_name: enaho_agriculture_item_parcels
  grain: item
  description: Características de las parcelas/chacras.
  source_system: inei_microdatos
  bronze_name: inei_2023_enaho02_2000a_raw
  raw_file_name: Enaho02-2023-2000A.csv
  year: 2023
schema:
  physical_type: parquet
  engine: duckdb
  columns:
  - name: AÑO
    type: VARCHAR
    description: Año de la Encuesta
    aliases:
    - ANO
    - ANIO
  - name: MES
    type: VARCHAR
    description: Mes de Ejecución de la Encuesta
  - name: NCONGLOME
    type: VARCHAR
    description: Número de Conglomerado (proveniente del marco)
  - name: SUB_CONGLOME
    type: VARCHAR
    description: Número de Subconglomerado (proveniente del marco)
  - name: CONGLOME
    type: VARCHAR
    description: Número de Conglomerado
  - name: VIVIENDA
    type: VARCHAR
    description: Número de Selección de Vivienda
  - name: HOGAR
    type: VARCHAR
    description: Número secuencial del Hogar
  - name: CODPERSO
    type: VARCHAR
    description: Número de orden de la Persona
  - name: CODINFOR
    type: VARCHAR
    description: Código de Informante
  - name: UBIGEO
    type: VARCHAR
    description: Ubicación geográfica
  - name: DOMINIO
    type: INTEGER
    description: Dominio Geográfico
    semantic_dictionary:
      '1': Costa Norte
      '2': Costa Centro
      '3': Costa Sur
      '4': Sierra Norte
      '5': Sierra Centro
      '6': Sierra Sur
      '7': Selva
      '8': Lima Metropolitana  – 8
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
  - name: ESTRATO
    type: INTEGER
    description: Estrato Geográfico
    semantic_dictionary:
      '1': De 500 000 a más habitantes
      '2': De 100 000 a 499 999 habitantes
      '3': De 50 000 a 99 999 habitantes
      '4': De 20 000 a 49 999 habitantes
      '5': De 2 000 a 19 999 habitantes
      '6': De 500 a 1 999 habitantes
      '7': Área de Empadronamiento Rural (AER) Compuesto
      '8': Área de Empadronamiento Rural (AER) Simple  – 8
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
  - name: PERIODO
    type: INTEGER
    description: Periodo de Ejecución de la Encuesta
    semantic_dictionary:
      '1': Primer Período
      '2': Segundo Período
      '3': Tercer Período
      '4': Cuarto Período
      '5': Quinto Período  –5
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
  - name: P2005A
    type: INTEGER
    description: Número de Parcela
  - name: P2005B
    type: DOUBLE
    description: Extensión de la Parcela (Hectáreas) 999.
    sentinel_nulls:
    - '999'
  - name: P2005C1
    type: INTEGER
    description: 'En los últimos 12 meses, ¿Esta parcela se usó para: Cultivos de
      campaña (transitorios)?'
  - name: P2005C2
    type: INTEGER
    description: 'En los últimos 12 meses, ¿Esta parcela se usó para: Cultivos permanentes?'
  - name: P2005C3
    type: INTEGER
    description: 'En los últimos 12 meses, ¿Esta parcela se usó para: Pastos Naturales?'
  - name: P2005C4
    type: INTEGER
    description: 'En los últimos 12 meses, ¿Esta parcela se usó para: Montes y Bosques?'
  - name: P2005C5
    type: INTEGER
    description: 'En los últimos 12 meses, ¿Esta parcela se usó para: Barbecho?'
  - name: P2005C6
    type: INTEGER
    description: 'En los últimos 12 meses, ¿Esta parcela se usó para: Descanso?'
  - name: P2005C7
    type: INTEGER
    description: 'En los últimos 12 meses, ¿Esta parcela se usó para: Otro?'
  - name: P2005D
    type: INTEGER
    description: '¿El Régimen de Tenencia es:'
  - name: P2005E
    type: INTEGER
    description: '¿Esta parcela cuenta con:'
  - name: P2005F1
    type: INTEGER
    description: '¿El tipo de riego es: Tecnificado?'
  - name: P2005F2
    type: INTEGER
    description: '¿El tipo de riego es: Por gravedad?'
  - name: P2005F3
    type: INTEGER
    description: '¿El tipo de riego es: Secano?'
  - name: P2005F4
    type: INTEGER
    description: '¿El tipo de riego es: Pozo / Agua subterránea?'
    metadata_inferred: true
  - name: TICUEST01B
    type: INTEGER
    description: Origen de cuestionario
    semantic_dictionary:
      '1': Cuestionario en hojas
      '2': Cuestionario en Tablet
    constraints:
    - allowed_values:
      - 1
      - 2
  - name: FACTORA07
    type: DOUBLE
    description: Factor de Expansión anual de Empleo/Ingresos ajustados por grupos
      de edad. Proyecciones CPV-2007

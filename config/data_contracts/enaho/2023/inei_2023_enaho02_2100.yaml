# ==============================================================================
# DATA CONTRACT: INEI - ENAHO
# Capa: Bronze -> Silver
# Motor de Validación Esperado: DuckDB (vía Dagster)
# ==============================================================================
dataset:
  domain: agriculture
  silver_name: enaho_agriculture_item_crops
  grain: item
  description: Transacciones de producción agrícola.
  source_system: inei_microdatos
  bronze_name: inei_2023_enaho02_2100_raw
  raw_file_name: Enaho02-2023-2100.csv
  year: 2023
schema:
  physical_type: parquet
  engine: duckdb
  columns:
  - name: AÑO
    type: VARCHAR
    description: Año de la Encuesta
    aliases:
    - ANO
    - ANIO
  - name: MES
    type: VARCHAR
    description: Mes de Ejecución de la Encuesta
  - name: NCONGLOME
    type: VARCHAR
    description: Número de Conglomerado (proveniente del marco)
  - name: SUB_CONGLOME
    type: VARCHAR
    description: Número de Subconglomerado (proveniente del marco)
  - name: CONGLOME
    type: VARCHAR
    description: Número de Conglomerado
  - name: VIVIENDA
    type: VARCHAR
    description: Número de Selección de Vivienda
  - name: HOGAR
    type: VARCHAR
    description: Número secuencial del Hogar
  - name: CODPERSO
    type: VARCHAR
    description: Número de orden de la Persona
  - name: CODINFOR
    type: VARCHAR
    description: Código de Informante
  - name: UBIGEO
    type: VARCHAR
    description: Ubicación geográfica
  - name: DOMINIO
    type: INTEGER
    description: Dominio Geográfico
    semantic_dictionary:
      '1': Costa Norte
      '2': Costa Centro
      '3': Costa Sur
      '4': Sierra Norte
      '5': Sierra Centro
      '6': Sierra Sur
      '7': Selva
      '8': Lima Metropolitana  – 8
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
  - name: ESTRATO
    type: INTEGER
    description: Estrato Geográfico
    semantic_dictionary:
      '1': De 500 000 a más habitantes
      '2': De 100 000 a 499 999 habitantes
      '3': De 50 000 a 99 999 habitantes
      '4': De 20 000 a 49 999 habitantes
      '5': De 2 000 a 19 999 habitantes
      '6': De 500 a 1 999 habitantes
      '7': Área de Empadronamiento Rural (AER) Compuesto
      '8': Área de Empadronamiento Rural (AER) Simple  – 8
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
  - name: PERIODO
    type: INTEGER
    description: Periodo de Ejecución de la Encuesta
    semantic_dictionary:
      '1': Primer Período
      '2': Segundo Período
      '3': Tercer Período
      '4': Cuarto Período
      '5': Quinto Período  –5
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
  - name: P2100A
    type: INTEGER
    description: Ocurrencia del Producto Fila para el Total Valor S/.
  - name: P2100B
    type: INTEGER
    description: Código de Producto Agrícola
  - name: P21001A
    type: DOUBLE
    description: ¿Cuál fue la Producción Total? - Cantidad
  - name: P21001B
    type: VARCHAR
    description: ¿Cuál fue la Producción Total? - Unidad de Medida
  - name: P21001C
    type: DOUBLE
    description: ¿Cuál fue la Producción Total? - Equivalencia en Kg.
  - name: P21002A
    type: DOUBLE
    description: De dicha producción ¿Cuánto se destinó a ... Venta?
  - name: P21002A1
    type: DOUBLE
    description: De dicha producción ¿Cuánto se destinó a ... Venta - Precio Unitario
  - name: P21002B
    type: INTEGER
    description: De dicha producción ¿Cuánto se destinó a ... Venta - Valor S/.
  - name: P21002C
    type: DOUBLE
    description: De dicha producción ¿Cuánto se destinó a ... Semilla?
  - name: P21002D
    type: INTEGER
    description: De dicha producción ¿Cuánto se destinó a ... Semilla - Valor S/
  - name: P21002E
    type: DOUBLE
    description: De dicha producción ¿Cuánto se destinó a ... Consumo del Hogar?
  - name: P21002E1
    type: DOUBLE
    description: De dicha producción ¿Cuánto se destinó a .. Consumo del Hogar - Precio
      Unitario
  - name: P21002F
    type: INTEGER
    description: De dicha producción ¿Cuánto se destinó a .. Consumo del Hogar - Valor
      S/.
  - name: P21002G
    type: DOUBLE
    description: De dicha producción ¿Cuánto se destinó a ... Trueque?
  - name: P21002H
    type: DOUBLE
    description: De dicha producción ¿Cuánto se destinó a ... Trueque - Valor S/
    metadata_inferred: true
  - name: P21002I
    type: DOUBLE
    description: De dicha producción ¿Cuánto se destinó a .. Subproductos?
  - name: P21002J
    type: INTEGER
    description: De dicha producción ¿Cuánto se destinó a .. Subproductos - Valor
      S/.
  - name: P21002K
    type: DOUBLE
    description: De dicha producción ¿Cuánto se destinó a ...Otros?
  - name: P21002L
    type: INTEGER
    description: De dicha producción ¿Cuánto se destinó a .. Otros - Valor S/.
  - name: P21002M
    type: DOUBLE
    description: De dicha producción ¿Cuánto se destinó a .. Total Cantidad
  - name: P21002N
    type: INTEGER
    description: De dicha producción ¿Cuánto se destinó a .. Total Valor S/.
  - name: P21002T
    type: INTEGER
    description: Total Producción Agricola S/.
  - name: TICUEST02
    type: INTEGER
    description: Origen de cuestionario
    semantic_dictionary:
      '1': Cuestionario en hojas
      '2': Cuestionario en Tablet
    constraints:
    - allowed_values:
      - 1
      - 2
  - name: FACTORA07
    type: DOUBLE
    description: Factor de Expansión anual de Empleo/Ingresos ajustados por grupos
      de edad. Proyecciones CPV-2007

# ==============================================================================
# DATA CONTRACT: INEI - ENAHO
# Capa: Bronze -> Silver
# Motor de Validación Esperado: DuckDB (vía Dagster)
# ==============================================================================
dataset:
  domain: agriculture
  silver_name: enaho_agriculture_item_byprods
  grain: item
  description: Subproductos agrícolas elaborados.
  source_system: inei_microdatos
  bronze_name: inei_2023_enaho02_2200_raw
  raw_file_name: Enaho02-2023-2200.csv
  year: 2023
schema:
  physical_type: parquet
  engine: duckdb
  columns:
  - name: AÑO
    type: VARCHAR
    description: Año de la Encuesta
    aliases:
    - ANO
    - ANIO
  - name: MES
    type: VARCHAR
    description: Mes de Ejecución de la Encuesta
  - name: NCONGLOME
    type: VARCHAR
    description: Número de Conglomerado (proveniente del marco)
  - name: SUB_CONGLOME
    type: VARCHAR
    description: Número de Subconglomerado (proveniente del marco)
  - name: CONGLOME
    type: VARCHAR
    description: Número de Conglomerado
  - name: VIVIENDA
    type: VARCHAR
    description: Número de Selección de Vivienda
  - name: HOGAR
    type: VARCHAR
    description: Número secuencial del Hogar
  - name: CODPERSO
    type: VARCHAR
    description: Número de orden de la Persona
  - name: CODINFOR
    type: VARCHAR
    description: Código de Informante
  - name: UBIGEO
    type: VARCHAR
    description: Ubicación geográfica
  - name: DOMINIO
    type: INTEGER
    description: Dominio Geográfico
    semantic_dictionary:
      '1': Costa Norte
      '2': Costa Centro
      '3': Costa Sur
      '4': Sierra Norte
      '5': Sierra Centro
      '6': Sierra Sur
      '7': Selva
      '8': Lima Metropolitana  – 8
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
  - name: ESTRATO
    type: INTEGER
    description: Estrato Geográfico
    semantic_dictionary:
      '1': De 500 000 a más habitantes
      '2': De 100 000 a 499 999 habitantes
      '3': De 50 000 a 99 999 habitantes
      '4': De 20 000 a 49 999 habitantes
      '5': De 2 000 a 19 999 habitantes
      '6': De 500 a 1 999 habitantes
      '7': Área de Empadronamiento Rural (AER) Compuesto
      '8': Área de Empadronamiento Rural (AER) Simple  – 8
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
  - name: PERIODO
    type: INTEGER
    description: Periodo de Ejecución de la Encuesta
    semantic_dictionary:
      '1': Primer Período
      '2': Segundo Período
      '3': Tercer Período
      '4': Cuarto Período
      '5': Quinto Período  –5
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
  - name: P2200A
    type: INTEGER
    description: Ocurrencia del tipo de Subproducto agrícola.
    semantic_dictionary:
      '99': Fila para el total de subproductos agrícolas S/.
    constraints:
    - allowed_values:
      - 99
  - name: P2200B
    type: VARCHAR
    description: Código del Subproducto Agrícola
  - name: P22001A
    type: DOUBLE
    description: ¿Cúal fue la Producción Total? - Cantidad
  - name: P22001B
    type: VARCHAR
    description: ¿Cúal fue la Producción Total? - Unidad de Medida.
  - name: P22001C
    type: DOUBLE
    description: ¿Cúal fue la Producción Total? - Equivalencia en Kg.
  - name: P22002A
    type: DOUBLE
    description: De dicha producción ¿Cuánto se destinó a ... Venta?
  - name: P22002A1
    type: DOUBLE
    description: De dicha producción ¿Cuánto se destinó a ... Venta - Precio unitario
  - name: P22002B
    type: INTEGER
    description: De dicha producción ¿Cuánto se destinó a ... Venta - Valor S/.
  - name: P22002C
    type: DOUBLE
    description: De dicha producción ¿Cuánto se destinó a ... Consumo del Hogar?
  - name: P22002C1
    type: DOUBLE
    description: De dicha producción ¿Cuánto se destinó a ... Consumo del Hogar -
      Precio unitario
  - name: P22002D
    type: INTEGER
    description: De dicha producción ¿Cuánto se destinó a ... Consumo del Hogar -
      Valor S/.
  - name: P22002E
    type: DOUBLE
    description: De dicha producción ¿Cuánto se destinó a ... Otros?
  - name: P22002G
    type: DOUBLE
    description: De dicha producción ¿Cuánto se destinó a ... Total Cantidad
  - name: P22002H
    type: INTEGER
    description: De dicha producción ¿Cuánto se destinó a ... Total Valor S/.
  - name: P22002T
    type: INTEGER
    description: Total Subproductos Agricolas S/.
  - name: TICUEST02
    type: INTEGER
    description: Origen de cuestionario
    semantic_dictionary:
      '1': Cuestionario en hojas
      '2': Cuestionario en Tablet RFaacntgoor d1e-2 Expansión anual de Empleo/Ingresos
        ajustados por grupos de edad.
    constraints:
    - allowed_values:
      - 1
      - 2
  - name: FACTORA07
    type: DOUBLE
    description: Proyecciones CPV-2007
  - name: P22002F
    type: DOUBLE
    description: De dicha producción ¿Cuánto se destinó a ... Otros - Valor S/
    metadata_inferred: true

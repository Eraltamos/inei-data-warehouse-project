# ==============================================================================
# DATA CONTRACT: INEI - ENAHO
# Capa: Bronze -> Silver
# Motor de Validación Esperado: DuckDB (vía Dagster)
# ==============================================================================
dataset:
  domain: agriculture
  silver_name: enaho_agriculture_item_forestry
  grain: item
  description: Producción de bienes forestales.
  source_system: inei_microdatos
  bronze_name: inei_2023_enaho02_2300_raw
  raw_file_name: Enaho02-2023-2300.csv
  year: 2023
schema:
  physical_type: parquet
  engine: duckdb
  columns:
  - name: AÑO
    type: VARCHAR
    description: Año de la Encuesta
    aliases:
    - ANO
    - ANIO
  - name: MES
    type: VARCHAR
    description: Mes de Ejecución de la Encuesta
  - name: NCONGLOME
    type: VARCHAR
    description: Número de Conglomerado (proveniente del marco)
  - name: SUB_CONGLOME
    type: VARCHAR
    description: Número de Subconglomerado (proveniente del marco)
  - name: CONGLOME
    type: VARCHAR
    description: Número de Conglomerado
  - name: VIVIENDA
    type: VARCHAR
    description: Número de Selección de Vivienda
  - name: HOGAR
    type: VARCHAR
    description: Número secuencial del Hogar
  - name: CODPERSO
    type: VARCHAR
    description: Número de orden de la Persona
  - name: CODINFOR
    type: VARCHAR
    description: Código de Informante
  - name: UBIGEO
    type: VARCHAR
    description: Ubicación geográfica
  - name: DOMINIO
    type: INTEGER
    description: Dominio Geográfico
    semantic_dictionary:
      '1': Costa Norte
      '2': Costa Centro
      '3': Costa Sur
      '4': Sierra Norte
      '5': Sierra Centro
      '6': Sierra Sur
      '7': Selva
      '8': Lima Metropolitana  – 8
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
  - name: ESTRATO
    type: INTEGER
    description: Estrato Geográfico
    semantic_dictionary:
      '1': De 500 000 a más habitantes
      '2': De 100 000 a 499 999 habitantes
      '3': De 50 000 a 99 999 habitantes
      '4': De 20 000 a 49 999 habitantes
      '5': De 2 000 a 19 999 habitantes
      '6': De 500 a 1 999 habitantes
      '7': Área de Empadronamiento Rural (AER) Compuesto
      '8': Área de Empadronamiento Rural (AER) Simple  – 8
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
  - name: PERIODO
    type: INTEGER
    description: Periodo de Ejecución de la Encuesta
    semantic_dictionary:
      '1': Primer Período
      '2': Segundo Período
      '3': Tercer Período
      '4': Cuarto Período
      '5': Quinto Período  –5
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
  - name: P2300A
    type: INTEGER
    description: Ocurrencia del Caso
    semantic_dictionary:
      '99': Fila para el total producción forestal S/.
    constraints:
    - allowed_values:
      - 99
  - name: P2300B
    type: VARCHAR
    description: Código de plantas y/o árboles
  - name: P23001
    type: INTEGER
    description: ¿Cuál es el valor total de la producción cosechada? - (S/.)
  - name: P23002A
    type: INTEGER
    description: De dicha producción ¿Cuánto se destinó a ... Venta? - (Valor S/.)
  - name: P23002B
    type: INTEGER
    description: De dicha producción ¿Cuánto se destinó a ... Consumo del Hogar? -
      (Valor S/.)
  - name: P23002C
    type: INTEGER
    description: De dicha producción ¿Cuánto se destinó a ... Total Valor S/.
  - name: P23002T
    type: INTEGER
    description: Total Producción Forestal en S/.
  - name: TICUEST02
    type: INTEGER
    description: Origen de cuestionario
    semantic_dictionary:
      '1': Cuestionario en hojas
      '2': Cuestionario en Tablet
    constraints:
    - allowed_values:
      - 1
      - 2
  - name: FACTORA07
    type: DOUBLE
    description: Factor de Expansión anual de Empleo/Ingresos ajustados por grupos
      de edad. Proyecciones CPV-2007

# ==============================================================================
# DATA CONTRACT: INEI - ENAHO
# Capa: Bronze -> Silver
# Motor de Validación Esperado: DuckDB (vía Dagster)
# ==============================================================================
dataset:
  domain: agriculture
  silver_name: enaho_agriculture_biz_expenses_base
  grain: biz
  description: Gastos agrícolas aplanados (Crudo).
  source_system: inei_microdatos
  bronze_name: inei_2023_enaho02_2400_raw
  raw_file_name: Enaho02-2023-2400.csv
  year: 2023
schema:
  physical_type: parquet
  engine: duckdb
  columns:
  - name: AÑO
    type: VARCHAR
    description: Año de la Encuesta
    aliases:
    - ANO
    - ANIO
  - name: MES
    type: VARCHAR
    description: Mes de Ejecución de la Encuesta
  - name: NCONGLOME
    type: VARCHAR
    description: Número de Conglomerado (proveniente del marco)
  - name: SUB_CONGLOME
    type: VARCHAR
    description: Número de Subconglomerado (proveniente del marco)
  - name: CONGLOME
    type: VARCHAR
    description: Número de Conglomerado
  - name: VIVIENDA
    type: VARCHAR
    description: Número de Selección de Vivienda
  - name: HOGAR
    type: VARCHAR
    description: Número secuencial del Hogar
  - name: CODPERSO
    type: VARCHAR
    description: Número de orden de la Persona
  - name: CODINFOR
    type: VARCHAR
    description: Código de Informante
  - name: UBIGEO
    type: VARCHAR
    description: Ubicación geográfica
  - name: DOMINIO
    type: INTEGER
    description: Dominio Geográfico
    semantic_dictionary:
      '1': Costa Norte
      '2': Costa Centro
      '3': Costa Sur
      '4': Sierra Norte
      '5': Sierra Centro
      '6': Sierra Sur
      '7': Selva
      '8': Lima Metropolitana  – 8
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
  - name: ESTRATO
    type: INTEGER
    description: Estrato Geográfico
    semantic_dictionary:
      '1': De 500 000 a más habitantes
      '2': De 100 000 a 499 999 habitantes
      '3': De 50 000 a 99 999 habitantes
      '4': De 20 000 a 49 999 habitantes
      '5': De 2 000 a 19 999 habitantes
      '6': De 500 a 1 999 habitantes
      '7': Área de Empadronamiento Rural (AER) Compuesto
      '8': Área de Empadronamiento Rural (AER) Simple  – 8
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
  - name: PERIODO
    type: INTEGER
    description: Periodo de Ejecución de la Encuesta
    semantic_dictionary:
      '1': Primer Período
      '2': Segundo Período
      '3': Tercer Período
      '4': Cuarto Período
      '5': Quinto Período  –5
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
  - name: P2400A
    type: INTEGER
    description: 'Durante los últimos 12 meses ¿Cuánto gastó en: Arrendamiento de
      tierras? - (S/.)'
  - name: P2400B
    type: INTEGER
    description: 'Durante los últimos 12 meses ¿Cuánto gastó en: Semillas - (S/.)'
  - name: P2400C
    type: INTEGER
    description: 'Durante los últimos 12 meses ¿Cuánto gastó en: Abonos y Fertilizantes
      - (S/.)'
  - name: P2400D
    type: INTEGER
    description: 'Durante los últimos 12 meses ¿Cuánto gastó en: Pesticidas, insecticidas,
      fungicidas, etc. - (S/.)'
  - name: P2400E
    type: INTEGER
    description: 'Durante los últimos 12 meses ¿Cuánto gastó en: Pago a jornaleros
      o peones (monetario y en especie) - (S/.)'
  - name: P2400F
    type: INTEGER
    description: 'Durante los últimos 12 meses ¿Cuánto gastó en: Compra de sacos,
      canastas, etc, para sus productos - (S/.)'
  - name: P2400G
    type: INTEGER
    description: 'Durante los últimos 12 meses ¿Cuánto gastó en: Transportes (gasolina,
      lubricantes,etc) - (S/.)'
  - name: P2400H
    type: INTEGER
    description: 'Durante los últimos 12 meses ¿Cuánto gastó en: Almacenamiento de
      productos - (S/.)'
  - name: P2400I
    type: INTEGER
    description: 'Durante los últimos 12 meses ¿Cuánto gastó en: Agua de riego - (S/.)'
  - name: P2400J
    type: INTEGER
    description: 'Durante los últimos 12 meses ¿Cuánto gastó en: Elaboración de subproductos
      (insumos y materia prima) - (S/.)'
  - name: P2400K
    type: INTEGER
    description: 'Durante los últimos 12 meses ¿Cuánto gastó en: Asistencia Técnica
      - (S/.)'
  - name: P2400L
    type: INTEGER
    description: 'Durante los últimos 12 meses ¿Cuánto gastó en: Otros gastos como
      alquiler de maquinaria, tractores, compra de herramientas agrícolas, etc. -
      (S/.)'
  - name: P2400M1
    type: INTEGER
    description: Durante los últimos 12 meses ¿Cuánto gastó en? - Productos agrícolas
      adquiridos con el FERTIABONO (en S/.)
  - name: P2400M
    type: INTEGER
    description: Total de gastos agrícolas y/o forestales en S/.
  - name: TICUEST02
    type: INTEGER
    description: Origen de cuestionario
    semantic_dictionary:
      '2': Cuestionario en Tablet
    constraints:
    - allowed_values:
      - 2
  - name: FACTORA07
    type: DOUBLE
    description: Factor de Expansión anual de Empleo/Ingresos ajustados por grupos
      de edad. Proyecciones CPV-2007

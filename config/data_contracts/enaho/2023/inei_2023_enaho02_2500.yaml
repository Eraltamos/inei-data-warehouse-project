# ==============================================================================
# DATA CONTRACT: INEI - ENAHO
# Capa: Bronze -> Silver
# Motor de Validación Esperado: DuckDB (vía Dagster)
# ==============================================================================
dataset:
  domain: agriculture
  silver_name: enaho_agriculture_item_livestock
  grain: item
  description: Producción pecuaria (Animales).
  source_system: inei_microdatos
  bronze_name: inei_2023_enaho02_2500_raw
  raw_file_name: Enaho02-2023-2500.csv
  year: 2023
schema:
  physical_type: parquet
  engine: duckdb
  columns:
  - name: AÑO
    type: VARCHAR
    description: Año de la Encuesta
    aliases:
    - ANO
    - ANIO
  - name: MES
    type: VARCHAR
    description: Mes de Ejecución de la Encuesta
  - name: NCONGLOME
    type: VARCHAR
    description: Número de Conglomerado (proveniente del marco)
  - name: SUB_CONGLOME
    type: VARCHAR
    description: Número de Subconglomerado (proveniente del marco)
  - name: CONGLOME
    type: VARCHAR
    description: Número de Conglomerado
  - name: VIVIENDA
    type: VARCHAR
    description: Número de Selección de Vivienda
  - name: HOGAR
    type: VARCHAR
    description: Número secuencial del Hogar
  - name: CODPERSO
    type: VARCHAR
    description: Número de orden de la Persona
  - name: CODINFOR
    type: VARCHAR
    description: Código de Informante
  - name: UBIGEO
    type: VARCHAR
    description: Ubicación geográfica
  - name: DOMINIO
    type: INTEGER
    description: Dominio Geográfico
    semantic_dictionary:
      '1': Costa Norte
      '2': Costa Centro
      '3': Costa Sur
      '4': Sierra Norte
      '5': Sierra Centro
      '6': Sierra Sur
      '7': Selva
      '8': Lima Metropolitana  – 8
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
  - name: ESTRATO
    type: INTEGER
    description: Estrato Geográfico
    semantic_dictionary:
      '1': De 500 000 a más habitantes
      '2': De 100 000 a 499 999 habitantes
      '3': De 50 000 a 99 999 habitantes
      '4': De 20 000 a 49 999 habitantes
      '5': De 2 000 a 19 999 habitantes
      '6': De 500 a 1 999 habitantes
      '7': Área de Empadronamiento Rural (AER) Compuesto
      '8': Área de Empadronamiento Rural (AER) Simple  – 8
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
  - name: PERIODO
    type: INTEGER
    description: Periodo de Ejecución de la Encuesta
    semantic_dictionary:
      '1': Primer Período
      '2': Segundo Período
      '3': Tercer Período
      '4': Cuarto Período
      '5': Quinto Período  –5
    constraints:
    - allowed_values:
      - 1
      - 2
      - 3
      - 4
      - 5
  - name: P2500A
    type: INTEGER
    description: Ocurrencia del Caso
    semantic_dictionary:
      '99': Fila para el total producción pecuaria
    constraints:
    - allowed_values:
      - 99
  - name: P2500B
    type: VARCHAR
    description: Código de Especie Animal
  - name: P25001A
    type: INTEGER
    description: ¿Qué cantidad de animales tuvo el mes anterior?
  - name: P25001B
    type: INTEGER
    description: ¿Qué cantidad de animales tenía hace 12 meses en el mes de ... del
      año...?
  - name: P25002A1
    type: DOUBLE
    description: En los últimos 12 meses de ... a ..., ¿Qué cantidad de animales ...
      Nacieron?
  - name: P25002A2
    type: INTEGER
    description: En los últimos 12 meses de ... a ..., ¿Qué cantidad de animales ...
      Nacieron - Valor S/.
  - name: P25002B1
    type: DOUBLE
    description: En los últimos 12 meses de ... a ..., ¿Qué cantidad de animales ...
      Compro?
  - name: P25002B2
    type: INTEGER
    description: En los últimos 12 meses de ... a ..., ¿Qué cantidad de animales ...
      Compro - Valor S/.
  - name: P25002C1
    type: DOUBLE
    description: En los últimos 12 meses de ... a ..., ¿Qué cantidad de animales ...
      Le regalaron?
  - name: P25002C2
    type: INTEGER
    description: En los últimos 12 meses de ... a ..., ¿Qué cantidad de animales ...
      Le regalaron - Valor S/.
  - name: P25002D1
    type: DOUBLE
    description: En los últimos 12 meses de ... a ..., ¿Qué cantidad de animales ...
      Recibió en trueque?
  - name: P25002D2
    type: INTEGER
    description: En los últimos 12 meses de ... a ..., ¿Qué cantidad de animales ...
      Recibió en trueque - Valor S/.
  - name: P25002E1
    type: DOUBLE
    description: En los últimos 12 meses de ... a ..., ¿Qué cantidad de animales ...
      Otros incrementos de stock?
  - name: P25002E2
    type: DOUBLE
    description: Variable derivada inferida (Hermana de P25002E1)
    metadata_inferred: true
  - name: P25002F1
    type: DOUBLE
    description: En los últimos 12 meses de ... a ..., ¿Qué cantidad de animales ...
      Total Cantidad Incrementos de Stock
  - name: P25002G1
    type: DOUBLE
    description: En los últimos 12 meses de ... a ..., ¿Qué cantidad de animales ...
      Vendió?
  - name: P25002G2
    type: INTEGER
    description: En los últimos 12 meses de ... a ..., ¿Qué cantidad de animales ...
      Vendió - Valor S/.
  - name: P25002H1
    type: DOUBLE
    description: En los últimos 12 meses de ... a ..., ¿Qué cantidad de animales ...
      Consumió en el Hogar?
  - name: P25002H2
    type: INTEGER
    description: En los últimos 12 meses de ... a ..., ¿Qué cantidad de animales ...
      Consumió en el Hogar - Valor S/.
  - name: P25002I1
    type: DOUBLE
    description: En los últimos 12 meses de ... a ..., ¿Qué cantidad de animales ...
      Dió en trueque?
  - name: P25002I2
    type: INTEGER
    description: En los últimos 12 meses de ... a ..., ¿Qué cantidad de animales ...
      Dió en trueque - Valor S/.
  - name: P25002J1
    type: DOUBLE
    description: En los últimos 12 meses de ... a ..., ¿Qué cantidad de animales ...
      Destino a la elaboración de subproductos?
  - name: P25002J2
    type: INTEGER
    description: En los últimos 12 meses de ... a ..., ¿Qué cantidad de animales ...
      Destino a la elaboración de subproductos - Valor S/.
  - name: P25002K1
    type: DOUBLE
    description: En los últimos 12 meses de ... a ..., ¿Qué cantidad de animales ...
      Murieron?
  - name: P25002K2
    type: INTEGER
    description: En los últimos 12 meses de ... a ..., ¿Qué cantidad de animales ...
      Murieron - Valor S/.
  - name: P25002L1
    type: DOUBLE
    description: En los últimos 12 meses de ... a ..., ¿Qué cantidad de animales ...
      Fueron robados?
  - name: P25002L2
    type: INTEGER
    description: En los últimos 12 meses de ... a ..., ¿Qué cantidad de animales ...
      Fueron robados - Valor S/.
  - name: P25002M1
    type: DOUBLE
    description: En los últimos 12 meses de ... a ..., ¿Qué cantidad de animales ...
      Otras reducciones de stock?
  - name: P25002M2
    type: INTEGER
    description: En los últimos 12 meses de ... a ..., ¿Qué cantidad de animales ...
      Otras reducciones de stock - Valor S/.
  - name: P25002N1
    type: DOUBLE
    description: En los últimos 12 meses de ... a ..., ¿Qué cantidad de animales ...
      Total Cantidad Reducciones de Stock
  - name: P25002O1
    type: INTEGER
    description: 'Total A: (Vendió + Consumió en el hogar + Dió en trueque) Valor
      S/.'
  - name: P25002O2
    type: INTEGER
    description: 'Total B: (Compró + Recibió en trueque) Valor en S/.'
  - name: P25002O3
    type: INTEGER
    description: Para Obtener Ingresos (A-B) - Total Ingresos en S/.
  - name: P25002T
    type: INTEGER
    description: Total Producción Pecuaria en S/.
  - name: TICUEST02
    type: INTEGER
    description: Origen de cuestionario
    semantic_dictionary:
      '1': Cuestionario en hojas
      '2': Cuestionario en Tablet
    constraints:
    - allowed_values:
      - 1
      - 2
  - name: FACTORA07
    type: DOUBLE
    description: Factor de Expansión anual de Empleo/Ingresos ajustados por grupos
      de edad. Proyecciones CPV-2007

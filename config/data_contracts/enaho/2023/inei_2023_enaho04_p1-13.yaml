    semantic_dictionary:
      '1': Si
      '2': 'No'
    sentinel_nulls:
    - 9
    constraints:
    - allowed_values:
      - 1
      - 2
  - name: E21GG
    type: INTEGER
    description: En el mes anterior, de los servicios prestados, ¿Hicieron uso de
      estos servicios en el hogar? - Autosuministro Total Mensual (S/.)
  - name: E22T
    type: INTEGER
    description: De los servicios prestados, ¿Cuánto fue su gasto total? - Gasto Total
      Mensual (S/.)
  - name: E23ST
    type: INTEGER
    description: 'Otros gastos en el mes anterior: Sub Total Gasto Mensual - Monto
      Mensual (S/.)'
  - name: E23T
    type: INTEGER
    description: 'Otros gastos en el mes anterior: Total Gasto Mensual - Monto Mensual
      (S/.)'
  - name: E24T

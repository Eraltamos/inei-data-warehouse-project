    description: Origen de cuestionario
    semantic_dictionary:
      '1': Cuestionario en hojas
      '2': Cuestionario en Tablet
    constraints:
    - allowed_values:
      - 1
      - 2
    required: false
    data_missing: true
  - name: TICUEST04
    type: INTEGER
    description: Origen de cuestionario
  - name: FACTORA07
